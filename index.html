<!DOCTYPE html>
<html lang="vi">
<head>

    <!-- Nhúng Google Fonts phong cách ứng dụng học tập hiện đại -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #74B9FF, #A8E6CF, #FFD3B6, #FFAAA5, #D4A5A5);
            --correct-color: #00D26A;
            --wrong-color: #FF4757;
            --text-main: #2D3436;
            --card-bg: rgba(255, 255, 255, 0.96);
            --purple-accent: #8854C0;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-main);
            background: var(--primary-gradient);
            background-size: 400% 400%;
            animation: loangMauNenChuyenDong 25s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes loangMauNenChuyenDong {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .pattern-overlay-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><g fill='%23FFFFFF'><path d='M20,20 L26,32 L38,34 L29,42 L32,54 L20,47 L8,54 L11,42 L2,34 L14,32 Z'/><circle cx='120' cy='40' r='10'/><path d='M40,110 C40,98 60,92 80,104 C100,92 120,98 120,110 C120,122 40,122 40,110 Z' opacity='0.6'/><path d='M130,120 Q142,102 154,120 T166,120' stroke='%23FFFFFF' stroke-width='3' fill='none'/></g></svg>");
            animation: movingBackgroundPattern 40s linear infinite;
        }

        @keyframes movingBackgroundPattern {
            from { background-position: 0 0; }
            to { background-position: 320px 640px; }
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 24px;
            border-radius: 14px;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            border: 2px solid var(--purple-accent);
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
        }

        header h1 {
            font-size: 1rem;
            color: var(--purple-accent);
            margin: 0;
            font-weight: 900;
        }

        .important-notice-box {
            background: #FFF9E6;
            border: 4px dashed #FDCB6E;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 rgba(253, 203, 110, 0.2);
            text-align: center;
        }

        .notice-title {
            font-size: 1.15rem;
            font-weight: 900;
            color: #D35400;
            margin-bottom: 6px;
            display: block;
        }

        .notice-content {
            font-size: 1rem;
            line-height: 1.5;
            color: #2D3436;
            font-weight: 700;
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 22px;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.05);
            border: 3px solid #FFF;
            position: relative;
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .question-number {
            background: var(--purple-accent);
            color: #FFF;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            font-size: 0.95rem;
            box-shadow: 0 4px 0 #6c3da3;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.6;
            color: var(--text-main);
            margin-top: 2px;
        }

        .choices-grid {
            display: flex;
            flex-direction: column;
            margin-top: 15px;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            width: 100%;
            background: #FFF;
            border: 3px solid #E2E8F0;
            border-radius: 18px;
            padding: 12px 18px;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            color: var(--text-main);
            box-shadow: 0 6px 0 #E2E8F0;
            transition: all 0.1s ease;
        }

        .choice-btn:hover:not(:disabled) {
            transform: scale(1.01) translateY(-2px);
            border-color: #B2BEC3;
            box-shadow: 0 8px 0 #B2BEC3;
        }

        .choice-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #B2BEC3;
        }

        .choice-prefix {
            background: #F1F5F9;
            border-radius: 10px;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            color: #64748B;
            flex-shrink: 0;
        }

        .choice-btn.correct-state {
            background-color: #E6FBF1 !important;
            border-color: var(--correct-color) !important;
            box-shadow: 0 6px 0 #00A955 !important;
            color: #006633 !important;
        }

        .choice-btn.correct-state .choice-prefix {
            background-color: var(--correct-color) !important;
            color: white !important;
        }

        .choice-btn.wrong-state {
            background-color: #FFEBEB !important;
            border-color: var(--wrong-color) !important;
            box-shadow: 0 6px 0 #D63031 !important;
            color: #99222A !important;
        }

        .choice-btn.wrong-state .choice-prefix {
            background-color: var(--wrong-color) !important;
            color: white !important;
        }

        .shake-animation {
            animation: shakeEffect 0.4s ease-in-out;
        }

        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .explanation-box {
            margin-top: 18px;
            background: #F8F9FA;
            border-radius: 18px;
            padding: 18px;
            border-left: 6px solid var(--purple-accent);
            display: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.04);
        }

        .explanation-title {
            font-weight: 900;
            color: var(--purple-accent);
            font-size: 1.05rem;
            margin-bottom: 10px;
        }

        .explanation-step {
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4A5568;
        }

        .step-heading {
            font-weight: 900;
            color: #2D3748;
            margin-bottom: 2px;
        }

        .footer-action-wrapper {
            text-align: center;
            margin: 40px 0;
        }

        .submit-exam-btn {
            background: #00D26A;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 16px 60px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #00A955, 0 12px 25px rgba(0,0,0,0.12);
            font-family: inherit;
            transition: all 0.15s;
        }

        .submit-exam-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 11px 0 #00A955, 0 15px 30px rgba(0,0,0,0.18);
        }

        .submit-exam-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #00A955;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-body-card {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid var(--purple-accent);
            transform: scale(0.8);
            transition: all 0.25s ease;
        }

        .modal-overlay.active .modal-body-card {
            transform: scale(1);
        }

        .modal-header-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--purple-accent);
            margin-bottom: 10px;
        }

        .modal-score-badge {
            font-size: 3.5rem;
            font-weight: 900;
            color: #00D26A;
            margin: 15px 0;
        }

        .modal-comment-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #2D3436;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .modal-reload-btn {
            background: var(--purple-accent);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 0 #6c3da3;
        }

        #canvas-confetti-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="pattern-overlay-layer"></div>
    <canvas id="canvas-confetti-layer"></canvas>

    <div class="container">
        <header>
            <h1>Giáo viên tạo: Ms Lê Hằng English</h1>
        </header>

        <div class="important-notice-box">
            <span class="notice-title">⚠️ LỜI NHẮC QUAN TRỌNG CỦA CÔ LÊ HẰNG ⚠️</span>
            <span class="notice-content">
                Hệ thống đã cập nhật trọn vẹn danh sách bài tập từ câu 51 đến câu 100.<br>

        </div>

        <div id="quiz-dynamic-render-target"></div>

        <div class="footer-action-wrapper">
            <button class="submit-exam-btn" onclick="processExamGrading()">🎉 NỘP BÀI KIỂM TRA 🎉</button>

    <div class="modal-overlay" id="result-summary-popup">
        <div class="modal-body-card">
            <div class="modal-header-title">🏆 KẾT QUẢ ĐẠT ĐƯỢC 🏆</div>
            <div class="modal-score-badge" id="score-counter-slot">0/0</div>
            <div class="modal-comment-text" id="teacher-feedback-slot">Lời khuyên...</div>
            <button class="modal-reload-btn" onclick="resetAndRestartQuiz()">THỬ SỨC LẠI</button>
        </div>
    </div>

    <script>
        const questionsDatabase = [
            {
                id: 51, text: "The cat was ______ to wait for the mouse to come out of its hole.",
                choices: [{text:"patient enough",key:"A"}, {text:"so patient",key:"B"}, {text:"enough patient",key:"C"}, {text:"too patient",key:"D"}], correct: "A",
                exp: ["Chú mèo đã đủ kiên nhẫn để chờ đợi chú chuột bò ra ngoài khỏi cái hang.", "Cấu trúc chỉ mức độ đủ để thực hiện hành động: 'Adj/Adv + enough + to-V'.", "Đúng trật tự vì tính từ 'patient' bắt buộc đứng trước 'enough'.", "Các phương án khác sai vị trí hoặc làm biến đổi sai nghĩa ngữ cảnh."]
            },
            {
                id: 52, text: "I can't find my purse anywhere; I must ______ it at the cinema.",
                choices: [{text:"leave",key:"A"}, {text:"have left",key:"B"}, {text:"be leaving",key:"C"}, {text:"have been leaving",key:"D"}], correct: "B",
                exp: ["Tớ không tìm thấy ví tiền ở đâu cả; chắc chắn là tớ đã bỏ quên nó ở rạp chiếu phim rồi.", "Cấu trúc đưa ra suy đoán chắc chắn gần như 100% về một sự việc trong quá khứ.", "Công thức chuẩn: 'must + have + V3/ed' chỉ một suy luận có cơ sở thực tế ở quá khứ.", "Các phương án khác chỉ hành động ở hiện tại hoặc tiếp diễn không hợp logic."]
            },
            {
                id: 53, text: "______ of the workers has his own work.",
                choices: [{text:"Every",key:"A"}, {text:"Each",key:"B"}, {text:"Other",key:"C"}, {text:"All",key:"D"}], correct: "B",
                exp: ["Mỗi người trong số các công nhân đều có công việc riêng của chính mình.", "Phân biệt đại từ chỉ định số ít kết hợp giới từ: 'Each of + Danh từ số nhiều + Động từ số ít'.", "Từ 'has' và 'his' chứng minh chủ ngữ phải đại diện cho thực thể số ít là 'Each'.", "'Every' không đi trực tiếp với giới từ 'of' (phải dùng Every one of); 'All' đi với động từ số nhiều."]
            },
            {
                id: 54, text: "The numbers add ______ to 70.",
                choices: [{text:"off",key:"A"}, {text:"up",key:"B"}, {text:"in",key:"C"}, {text:"out",key:"D"}], correct: "B",
                exp: ["Các con số này cộng lại tạo thành tổng bằng 70.", "Cụm động từ toán học chỉ tổng số lượng tích lũy.", "Phrasal Verb: 'add up to + số lượng' nghĩa là tổng cộng lại thành bao nhiêu.", "Các giới từ còn lại không tạo thành cụm từ có nghĩa phù hợp."]
            },
            {
                id: 55, text: "The equipment in our office needs ______ .",
                choices: [{text:"moderner",key:"A"}, {text:"modernizing",key:"B"}, {text:"modernized",key:"C"}, {text:"modernization",key:"D"}], correct: "B",
                exp: ["Các trang thiết bị trong văn phòng của chúng ta cần được hiện đại hóa.", "Cấu trúc bị động đặc biệt với động từ need: 'S (vật) + need + V-ing' mang nghĩa là cần được làm gì.", "Danh động từ 'modernizing' thể hiện hành động trang thiết bị cần được cải tiến.", "Dùng danh từ 'modernization' hoặc tính từ so sánh là sai cấu trúc sau need."]
            },
            {
                id: 56, text: "He felt ______ when he failed the exams the second time.",
                choices: [{text:"discouraged",key:"A"}, {text:"annoyed",key:"B"}, {text:"undecided",key:"C"}, {text:"determined",key:"D"}], correct: "A",
                exp: ["Anh ấy cảm thấy nản lòng, mất đi ý chí khi trượt kỳ thi lần thứ hai.", "Lựa chọn từ vựng phù hợp với tâm trạng hụt hẫng sau thất bại.", "'discouraged' mang ý nghĩa nản lòng, mất hết động lực quyết tâm.", "'determined' mang nghĩa quyết tâm, trái ngược hoàn toàn ngữ cảnh tâm lý."]
            },
            {
                id: 57, text: "I have bought a present for my mother, and now I need some ______ .",
                choices: [{text:"paper wrapper",key:"A"}, {text:"wrap paper",key:"B"}, {text:"wrapped paper",key:"C"}, {text:"wrapping paper",key:"D"}], correct: "D",
                exp: ["Tớ vừa mua một món quà cho mẹ, và bây giờ tớ cần một ít giấy gói quà.", "Cụm danh từ ghép chỉ công dụng chức năng vật dụng đời sống.", "Cụm từ cố định bất biến: 'wrapping paper' (giấy chuyên dụng dùng để gói quà).", "Các cách sắp xếp trật tự từ khác hoàn toàn không tự nhiên và sai ngữ pháp."]
            },
            {
                id: 58, text: "Computer is one of the most important ______ of the 20th century.",
                choices: [{text:"inventings",key:"A"}, {text:"inventories",key:"B"}, {text:"inventions",key:"C"}, {text:"inventors",key:"D"}], correct: "C",
                exp: ["Máy tính là một trong những phát minh quan trọng nhất của thế kỷ 20.", "Cấu trúc số nhiều đứng sau cụm chọn lọc: 'one of the + most + Adj + Danh từ số nhiều'.", "Danh từ 'inventions' chỉ các phát minh, công trình khoa học sáng tạo.", "'inventors' là nhà sáng chế người; 'inventories' là danh mục hàng tồn kho."]
            },
            {
                id: 59, text: "If they are not careful with their accounts, their business will go ______ .",
                choices: [{text:"poor",key:"A"}, {text:"bankrupt",key:"B"}, {text:"penniless",key:"C"}, {text:"broken",key:"D"}], correct: "B",
                exp: ["Nếu họ không cẩn thận với sổ sách kế toán của mình, doanh nghiệp của họ sẽ bị phá sản.", "Cụm thành ngữ kinh tế chỉ thực trạng sụp đổ tài chính doanh nghiệp.", "Cụm từ kết hợp cố định: 'go bankrupt' (rơi vào tình trạng phá sản hoàn toàn).", "Các tính từ nghèo đói khác không đi kèm với động từ liên kết 'go' tạo thành nghĩa này."]
            },
            {
                id: 60, text: "It was really kind ______ you to help those poor people.",
                choices: [{text:"by",key:"A"}, {text:"of",key:"B"}, {text:"at",key:"C"}, {text:"to",key:"D"}], correct: "B",
                exp: ["Bạn thật sự rất tốt bụng khi đã ra tay giúp đỡ những người nghèo khổ đó.", "Cấu trúc khen ngợi phẩm chất, đức tính tốt đẹp của một cá nhân.", "Công thức cố định: 'It + be + Adj (chỉ tính cách) + of + somebody + to-V'.", "Sử dụng các giới từ khác như 'to' hoặc 'by' là sai bản chất công thức."]
            },
            {
                id: 61, text: "Do you know ______ ?",
                choices: [{text:"what wrong was it with",key:"A"}, {text:"what's wrong with it",key:"B"}, {text:"what wrong was with it",key:"C"}, {text:"what wrong is it with",key:"D"}], correct: "B",
                exp: ["Cậu có biết có chuyện gì đang xảy ra / bị hỏng hóc với nó không?", "Mệnh đề danh ngữ đóng vai trò tân ngữ đứng sau động từ know.", "Cấu trúc chuẩn văn phong: 'what is wrong with something' (có vấn đề gì với cái gì).", "Vì 'what' đóng vai trò làm chủ ngữ luôn trong mệnh đề phụ nên không mượn chủ ngữ giả 'it' chèn giữa."]
            },
            {
                id: 62, text: "If you had taken my advice, you ______ in such difficulties.",
                choices: [{text:"won't be",key:"A"}, {text:"hadn't been",key:"B"}, {text:"wouldn't be",key:"C"}, {text:"wouldn't have been",key:"D"}], correct: "C",
                exp: ["Nếu hành động nghe lời khuyên diễn ra trong quá khứ, hiện tại bạn đã không gặp khó khăn thế này.", "Cấu trúc câu điều kiện trộn hỗn hợp (Mixed Conditional): Giả định quá khứ dẫn đến kết quả hiện tại.", "Mệnh đề chính bộc lộ kết quả hiện tại chia theo hình thái loại 2: 'S + wouldn't + V-bare'.", "Chọn 'wouldn't have been' là sai vì biến nó thành loại 3 thuần túy không hợp ngữ cảnh hệ quả hiện tại."]
            },
            {
                id: 63, text: "Hair color is one of ______ characteristics to be used in identifying people.",
                choices: [{text:"the most obviously",key:"A"}, {text:"most obvious",key:"B"}, {text:"obviously the most",key:"C"}, {text:"the most obvious",key:"D"}], correct: "D",
                exp: ["Màu tóc là một trong những đặc điểm rõ ràng nhất được sử dụng để nhận dạng con người.", "Cấu trúc so sánh nhất bổ nghĩa cho danh từ số nhiều đứng sau.", "Công thức so sánh nhất tính từ dài: 'the most + Adjective + Noun'. Tính từ ở đây là 'obvious'.", "Dùng trạng từ đuôi '-ly' bổ nghĩa trực tiếp cho danh từ là sai ngữ pháp."]
            },
            {
                id: 64, text: "I would appreciate it ______ what I have told you a secret.",

        let trackedStudentAnswers = {};
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playDingSound() {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08);
                osc.frequency.setValueAtTime(783.99, now + 0.16);
                osc.frequency.setValueAtTime(1046.50, now + 0.24);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.22, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.5);
            } catch(e) {}
        }

        function playBuzzSound() {
            try {
                const now = audioCtx.currentTime;
                const frequencies = [392.00, 349.23, 261.63];
                frequencies.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.12));
                    gain.gain.setValueAtTime(0, now + (idx * 0.12));
                    gain.gain.linearRampToValueAtTime(0.18, now + (idx * 0.12) + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + (idx * 0.12) + 0.14);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.12)); osc.stop(now + (idx * 0.12) + 0.14);
                });
            } catch(e) {}
        }

        function runConfettiExplosion() {
            const canvas = document.getElementById('canvas-confetti-layer');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            const paletteColors = ['#FFC107', '#FF5722', '#E91E63', '#9C27B0', '#00C9A7', '#00D26A', '#8854C0'];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    radius: Math.random() * 4 + 4,
                    density: Math.random() * canvas.height,
                    color: paletteColors[Math.floor(Math.random() * paletteColors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltIncremental: Math.random() * 0.05 + 0.02,
                    angle: 0
                });
            }
            function animateConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let continueAnimation = false;
                particles.forEach((p) => {
                    p.angle += p.tiltIncremental;
                    p.y += (Math.cos(p.density) + 3 + p.radius / 2) / 1.8;
                    p.x += Math.sin(p.angle);
                    if (p.y <= canvas.height) continueAnimation = true;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });
                if (continueAnimation) requestAnimationFrame(animateConfettiFrame);
            }
            animateConfettiFrame();
        }

        function buildAndRenderInterface() {
            const quizTarget = document.getElementById('quiz-dynamic-render-target');
            quizTarget.innerHTML = '';

            questionsDatabase.forEach((q, idx) => {
                const cardNode = document.createElement('div');
                cardNode.className = 'quiz-card';
                cardNode.id = `card-wrapper-id-${q.id}`;
                
                let choicesHtmlContent = '';
                q.choices.forEach(choice => {
                    choicesHtmlContent += `
                        <button class="choice-btn" id="btn-choice-item-${q.id}-${choice.key}" onclick="evaluateUserChoice(${q.id}, '${choice.key}', '${q.correct}')">
                            <span class="choice-prefix">${choice.key}</span>
                            <span class="choice-body-text">${choice.text}</span>
                        </button>
                    `;
                });

                cardNode.innerHTML = `
                    <div class="question-header">
                        <div class="question-number">${idx + 51}</div>
                        <div class="question-text">${q.text}</div>
                    </div>
                    <div class="choices-grid" id="choices-grid-box-id-${q.id}">
                        ${choicesHtmlContent}
                    </div>
                    
                    <div class="explanation-box" id="explanation-box-view-id-${q.id}">
                        <div class="explanation-title">💡 GIẢI THÍCH CHI TIẾT TỪ CÔ LÊ HẰNG:</div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 1: Ý nghĩa ngữ cảnh câu gốc</div>
                            <div>${q.exp[0]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 2: Bản chất bẫy ngữ pháp / từ vựng</div>
                            <div>${q.exp[1]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 3: Tại sao đáp án này ĐÚNG?</div>
                            <div style="font-weight: 700; color: #00A955;">${q.exp[2]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 4: Tại sao các phương án khác SAI?</div>
                            <div>${q.exp[3]}</div>
                        </div>
                    </div>
                `;
                quizTarget.appendChild(cardNode);
            });
        }

        function evaluateUserChoice(questionId, chosenKey, correctKey) {
            if (trackedStudentAnswers[questionId] !== undefined) return;
            trackedStudentAnswers[questionId] = chosenKey;
            
            const targetBtnNode = document.getElementById(`btn-choice-item-${questionId}-${chosenKey}`);
            const correctBtnNode = document.getElementById(`btn-choice-item-${questionId}-${correctKey}`);
            const parentCardNode = document.getElementById(`card-wrapper-id-${questionId}`);
            
            if (chosenKey === correctKey) {
                targetBtnNode.classList.add('correct-state');
                playDingSound();
                runConfettiExplosion();
            } else {
                targetBtnNode.classList.add('wrong-state');
                if (correctBtnNode) correctBtnNode.classList.add('correct-state');
                parentCardNode.classList.add('shake-animation');
                playBuzzSound();
                setTimeout(() => parentCardNode.classList.remove('shake-animation'), 450);
            }

            const childrenButtons = document.getElementById(`choices-grid-box-id-${questionId}`).getElementsByClassName('choice-btn');
            for (let btn of childrenButtons) { btn.disabled = true; }

            document.getElementById(`explanation-box-view-id-${questionId}`).style.display = 'block';
        }

        function processExamGrading() {
            let correctCount = 0;
            const totalQuestionsCount = questionsDatabase.length;
            
            questionsDatabase.forEach(q => {
                if (trackedStudentAnswers[q.id] === q.correct) {
                    correctCount++;
                }
            });

            const rawSuccessPercentage = (correctCount / totalQuestionsCount) * 100;
            const scoreDisplaySlot = document.getElementById('score-counter-slot');
            const commentDisplaySlot = document.getElementById('teacher-feedback-slot');

            scoreDisplaySlot.innerText = `${correctCount} / ${totalQuestionsCount}`;

            if (rawSuccessPercentage < 50) {
                commentDisplaySlot.innerText = "Điểm số cần cải thiện thêm một chút con nhé. Đọc lại kỹ lưỡng phần phân tích bẫy ngữ pháp của cô Lê Hằng để tích lũy kinh nghiệm thực chiến đề Chuyên nha! 💕";
            } else if (rawSuccessPercentage >= 50 && rawSuccessPercentage <= 85) {
                commentDisplaySlot.innerText = "Kết quả rất đáng khen ngợi! Lưu lại các câu thành ngữ (Idiom) và từ ghép bị sai vào sổ tay để ôn luyện hàng tuần nha con! 🌟";
            } else {
                commentDisplaySlot.innerText = "Xuất sắc tuyệt đối! Con làm chủ hoàn toàn các cấu trúc từ loại nâng cao và bẫy chia động từ rồi, tự tin chinh phục điểm số cao nhất nhé! 🎉💎";
            }

            document.getElementById('result-summary-popup').classList.add('active');
        }

        function resetAndRestartQuiz() {
            document.getElementById('result-summary-popup').classList.remove('active');
            trackedStudentAnswers = {};
            buildAndRenderInterface();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            buildAndRenderInterface();
        };
    </script>
